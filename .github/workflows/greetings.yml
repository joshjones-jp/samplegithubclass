name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Thanks so much for pointing out this issue- we will be working on it together!"
        pr-message: "Wow- thanks for sharing your talents and contributing! We will review your code and correct for any issues."
